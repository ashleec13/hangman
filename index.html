<!doctype html>
<html lang="en">

<head>
    <title>Snowman Guess</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://use.typekit.net/tux3vsn.css">
</head>

<body>
    <header>
        <!-- place navbar here -->
    </header>

    <!-- START SNOW EFFECT -->
    <div class="snow-wrapper">
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
    </div>
    <!-- END SNOW EFFECT -->

    <div class="game-container">
        <!-- Hangman Image -->
        <img id="hangmanImg" src="easyHangman/eastStart.png" alt="Hangman Image" class="hangmanImage" />

        <!-- Difficulty Buttons -->
        <div class="buttons">
            <button class="easyMode btn btn-primary">Easy</button>
            <button class="mediumMode btn btn-warning">Medium</button>
            <button class="hardMode btn btn-danger">Hard</button>
        </div>

        <!-- Word Display -->
        <div id="wordDisplay"></div>

        <!-- Input & Guess Button -->
        <input id="guessInput" maxlength="1" placeholder="Letter" class="form-control d-inline-block w-auto" />
        <button id="guessBtn" class="btn btn-success">Guess</button>
        <button id="restartBtn" class="btn btn-secondary">Restart</button>

        <!-- Guessed letters and guesses left -->
        <p>Guessed Letters: <span id="guessedLetters"></span></p>
        <p>Guesses Left: <span id="guessesLeft"></span></p>

        <!-- Message -->
        <p id="message"></p>

        <!-- Keyboard -->
        <div id="keyboard"></div>
    </div>

    <footer>
        <!-- place footer here -->
    </footer>

    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>

    <!-- Hangman JS -->
    <script src="script.js"></script>
</body>

</html>
