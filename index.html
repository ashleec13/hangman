<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowman Guess</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.typekit.net/tux3vsn.css">
</head>

<body>

    <!-- Snow wrapper -->
    <div class="snow-wrapper w-100">
        <!-- 30 snowflakes, you can add more by copying the div -->
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
    </div>

    <!-- Game Container -->
    <div class="game-container">
        <img id="hangmanImg" src="easyHangman/eastStart.png" alt="Hangman" class="hangmanImage">

        <div class="game-content">
            <!-- Difficulty Buttons -->
            <div class="buttons">
                <button class="btn easyMode">Easy</button>
                <button class="btn mediumMode">Medium</button>
                <button class="btn hardMode">Hard</button>
            </div>

            <!-- Word Display -->
            <div id="wordDisplay"></div>

            <!-- Input row with Guess + Restart -->
            <div class="input-row">
                <input id="guessInput" maxlength="1" placeholder="Letter" class="form-control w-auto text-center mx-auto">
                <div class="side-buttons">
                    <button id="guessBtn" class="btn">Guess</button>
                    <button id="restartBtn" class="btn">Restart</button>
                </div>
            </div>

            <!-- Guessed letters and guesses left -->
            <p>Guessed Letters: <span id="guessedLetters"></span></p>
            <p>Guesses Left: <span id="guessesLeft"></span></p>
            <p id="message"></p>

            <!-- Keyboard -->
            <div id="keyboard"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
